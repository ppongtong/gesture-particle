<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0c0c28"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <!-- Outer ring — 8 particles -->
    <circle cx="16"   cy="4.2"  r="1.35" fill="#00e5ff" opacity="0.95"/>
    <circle cx="23.5" cy="7.2"  r="1.15" fill="#00c8f0" opacity="0.85"/>
    <circle cx="27.5" cy="15"   r="1.30" fill="#00e5ff" opacity="0.90"/>
    <circle cx="25.5" cy="23"   r="1.15" fill="#00c8f0" opacity="0.82"/>
    <circle cx="18.5" cy="27.8" r="1.30" fill="#00e5ff" opacity="0.88"/>
    <circle cx="10"   cy="27.2" r="1.15" fill="#00c8f0" opacity="0.80"/>
    <circle cx="4.5"  cy="21"   r="1.30" fill="#00e5ff" opacity="0.88"/>
    <circle cx="4.2"  cy="12"   r="1.15" fill="#00c8f0" opacity="0.82"/>

    <!-- Mid ring — 6 particles -->
    <circle cx="16"   cy="9"    r="0.95" fill="#70ecff" opacity="0.88"/>
    <circle cx="21.5" cy="12"   r="0.85" fill="#70ecff" opacity="0.82"/>
    <circle cx="22.5" cy="19.5" r="0.90" fill="#70ecff" opacity="0.82"/>
    <circle cx="16"   cy="23.5" r="0.95" fill="#70ecff" opacity="0.85"/>
    <circle cx="10"   cy="19.5" r="0.85" fill="#70ecff" opacity="0.80"/>
    <circle cx="10.5" cy="12"   r="0.90" fill="#70ecff" opacity="0.80"/>

    <!-- Centre glow -->
    <circle cx="16" cy="16" r="2.8" fill="white" opacity="0.96"/>
    <circle cx="14.5" cy="14.5" r="1.1" fill="#d0f6ff" opacity="0.75"/>
  </g>
</svg>
